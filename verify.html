<!-- Add Firebase scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
    authDomain: "amvibe-a22db.firebaseapp.com",
    projectId: "amvibe-a22db",
    storageBucket: "amvibe-a22db.appspot.com",
    messagingSenderId: "717648312311",
    appId: "1:717648312311:web:c97e204d16e4211b9360f2",
    measurementId: "G-WPV8M3E8K2"
  };

  firebase.initializeApp(firebaseConfig);

  const inputs = document.querySelectorAll('.otp-input');
  inputs.forEach((input, index) => {
    input.addEventListener('input', (e) => {
      if (e.target.value.length === 1 && index < inputs.length - 1) {
        inputs[index + 1].focus();
      }
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && index > 0) {
        inputs[index - 1].focus();
      }
    });
  });

  function verifyOTP() {
    let otp = '';
    inputs.forEach(input => otp += input.value);

    if (otp.length !== 6) {
      alert("Please enter 6-digit OTP");
      return;
    }

    const fullPhone = localStorage.getItem('verificationPhone');
    if (!fullPhone) {
      alert("Session expired. Please try again.");
      window.location.href = "phone.html";
      return;
    }

    // Get confirmationResult again
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });
    firebase.auth().signInWithPhoneNumber(fullPhone, window.recaptchaVerifier)
      .then(function (confirmationResult) {
        confirmationResult.confirm(otp)
          .then(function (result) {
            const user = result.user;
            alert("Phone number verified successfully!");
            // पुढचा पेज redirect करा
            // window.location.href = "home.html";
          })
          .catch(function (error) {
            alert("Invalid OTP: " + error.message);
          });
      })
      .catch(function (error) {
        alert("Something went wrong: " + error.message);
      });
  }

  function resendOTP() {
    alert("Resending OTP is not yet implemented.");
  }

  // Display masked phone number
  const phone = localStorage.getItem('verificationPhone');
  if (phone) {
    const masked = phone.replace(/^(\+\d{2})(\d{4})(\d{3})(\d{2})$/, "$1 •••• •••$3");
    document.querySelector(".otp-message").innerHTML = `We've sent a 6-digit code to <strong>${masked}</strong><br>(Expires in 5:00)`;
  }
</script>
