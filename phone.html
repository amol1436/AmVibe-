<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Phone Login - AmVibe</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: 'Circular', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      margin: 0;
    }
    .container {
      background-color: #121212;
      padding: 30px;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      border-radius: 30px;
      border: none;
    }
    input {
      background-color: #333;
      color: #fff;
    }
    button {
      background-color: #1DB954;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    #recaptcha-container {
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Phone Number Login</h2>
    <input type="text" id="phone-number" placeholder="+91XXXXXXXXXX" />
    <div id="recaptcha-container"></div>
    <button onclick="sendOTP()">Send OTP</button>

    <input type="text" id="otp" placeholder="Enter OTP" style="display:none;" />
    <button onclick="verifyOTP()" style="display:none;" id="verify-btn">Verify OTP</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      RecaptchaVerifier,
      signInWithPhoneNumber
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2",
      measurementId: "G-WPV8M3E8K2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Setup Recaptcha
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
      size: 'normal',
      callback: (response) => {
        console.log('reCAPTCHA verified');
      },
      'expired-callback': () => {
        alert("reCAPTCHA expired, please refresh.");
      }
    });

    window.sendOTP = () => {
      const phoneNumber = document.getElementById("phone-number").value;
      const appVerifier = window.recaptchaVerifier;

      signInWithPhoneNumber(auth, phoneNumber, appVerifier)
        .then((confirmationResult) => {
          window.confirmationResult = confirmationResult;
          alert("OTP sent!");

          // Show OTP input
          document.getElementById("otp").style.display = "block";
          document.getElementById("verify-btn").style.display = "block";
        })
        .catch((error) => {
          alert("Error sending OTP: " + error.message);
        });
    };

    window.verifyOTP = () => {
      const otp = document.getElementById("otp").value;

      window.confirmationResult.confirm(otp)
        .then((result) => {
          const user = result.user;
          alert("Login successful! Welcome " + user.phoneNumber);
          // window.location.href = "home.html";
        })
        .catch((error) => {
          alert("Invalid OTP. Please try again.");
        });
    };
  </script>
</body>
</html>
