<!DOCTYPE html>
<html>
<head>
  <title>AmVibe - Premium Phone Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --primary: #1DB954;
      --dark: #121212;
      --light: #FFFFFF;
      --gray: #A7A7A7;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Circular', -apple-system, sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #191414 0%, #000000 100%);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .login-container {
      background: var(--dark);
      width: 100%;
      max-width: 480px;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      text-align: center;
      animation: fadeIn 0.6s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .logo {
      width: 120px;
      margin-bottom: 30px;
      filter: brightness(1.1);
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 32px;
      font-weight: 700;
      background: linear-gradient(to right, #1DB954, #1ED760);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .input-group {
      margin-bottom: 24px;
      position: relative;
    }
    
    .country-selector {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .flag-dropdown {
      position: relative;
      width: 120px;
    }
    
    .flag-dropdown select {
      width: 100%;
      padding: 14px 16px;
      background: var(--dark);
      border: 1px solid #333;
      border-radius: 8px;
      color: var(--light);
      font-size: 16px;
      appearance: none;
      cursor: pointer;
    }
    
    .flag-dropdown::after {
      content: "▼";
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      pointer-events: none;
    }
    
    input {
      width: 100%;
      padding: 14px 16px;
      background: var(--dark);
      border: 1px solid #333;
      border-radius: 8px;
      color: var(--light);
      font-size: 16px;
      transition: all 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(29, 185, 84, 0.2);
    }
    
    .disclaimer {
      color: var(--gray);
      font-size: 12px;
      line-height: 1.6;
      margin: 30px 0;
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 500px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .btn:hover {
      background: #1ED760;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(29, 185, 84, 0.3);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .country-flag {
      width: 24px;
      height: 16px;
      margin-right: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="https://raw.githubusercontent.com/amol1436/AmVibe-/main/logo.png" alt="AmVibe Logo" class="logo">
    <h1>Enter Your Phone Number</h1>
    
    <div class="input-group">
      <div class="country-selector">
        <div class="flag-dropdown">
          <select id="countryCode">
            <option value="+91" data-flag="🇮🇳">India (+91)</option>
            <option value="+1" data-flag="🇺🇸">USA (+1)</option>
            <option value="+44" data-flag="🇬🇧">UK (+44)</option>
            <option value="+81" data-flag="🇯🇵">Japan (+81)</option>
            <option value="+86" data-flag="🇨🇳">China (+86)</option>
            <option value="+33" data-flag="🇫🇷">France (+33)</option>
            <option value="+49" data-flag="🇩🇪">Germany (+49)</option>
            <option value="+7" data-flag="🇷🇺">Russia (+7)</option>
            <option value="+971" data-flag="🇦🇪">UAE (+971)</option>
            <option value="+65" data-flag="🇸🇬">Singapore (+65)</option>
          </select>
        </div>
      </div>
      <input type="tel" id="phone" placeholder="Enter phone number">
    </div>
    
    <p class="disclaimer">
      We'll send a verification code to this number.<br>
      Standard message rates may apply.
    </p>
    
    <button class="btn" onclick="sendOTP()">
      Send Verification Code
    </button>
  </div>

  <script>
    // देश ध्वज दाखवण्यासाठी
    document.getElementById('countryCode').addEventListener('change', function() {
      const flag = this.options[this.selectedIndex].getAttribute('data-flag');
      // ध्वज दाखवण्याचा कोड येथे जोडू शकता
    });

    function sendOTP() {
      const countryCode = document.getElementById("countryCode").value;
      const phoneNumber = document.getElementById("phone").value;
      
      if (!phoneNumber) {
        alert("Please enter your phone number");
        return;
      }
      
      // Firebase OTP लॉजिक येथे जोडा
      console.log("Sending OTP to:", countryCode + phoneNumber);
      alert(`Verification code will be sent to ${countryCode} ${phoneNumber}`);
    }
  </script>
</body>
</html>
