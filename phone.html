<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enter Phone Number - AmVibe</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: 'Circular', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    h2 {
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-size: 16px;
      margin-bottom: 8px;
    }

    .phone-input {
      display: flex;
      align-items: center;
      background-color: #121212;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 20px;
    }

    .phone-input span {
      margin-right: 10px;
      color: #ccc;
    }

    input[type="text"] {
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 16px;
      width: 100%;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 30px;
      background-color: #1DB954;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:disabled {
      background-color: #333;
      cursor: not-allowed;
    }

    .note {
      font-size: 13px;
      color: #999;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Enter phone number</h2>

    <label>India</label>
    <div class="phone-input">
      <span>+91</span>
      <input type="text" id="phone-number" placeholder="Phone number" oninput="checkInput()" />
    </div>

    <button id="next-btn" onclick="sendOTP()" disabled>Next</button>

    <div class="note">
      We’ll send you a code to confirm your phone number.<br>
      We may occasionally send you service-based messages.
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      RecaptchaVerifier,
      signInWithPhoneNumber
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2",
      measurementId: "G-WPV8M3E8K2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'next-btn', {
      'size': 'invisible',
      'callback': (response) => {
        console.log("reCAPTCHA passed");
      }
    });

    window.sendOTP = () => {
      const number = document.getElementById("phone-number").value.trim();
      const fullNumber = "+91" + number;
      const appVerifier = window.recaptchaVerifier;

      signInWithPhoneNumber(auth, fullNumber, appVerifier)
        .then((confirmationResult) => {
          window.confirmationResult = confirmationResult;
          alert("OTP Sent!");
          // Redirect to OTP verification page (if needed)
        })
        .catch((error) => {
          alert("Error: " + error.message);
        });
    };

    window.checkInput = () => {
      const input = document.getElementById("phone-number").value.trim();
      document.getElementById("next-btn").disabled = input.length < 10;
    };
  </script>
</body>
</html>
