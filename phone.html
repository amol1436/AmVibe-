<!DOCTYPE html>
<html>
  <head>
    <title>Phone Number Entry</title>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
      import {
        getAuth,
        RecaptchaVerifier,
        signInWithPhoneNumber,
      } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
        authDomain: "amvibe-a22db.firebaseapp.com",
        projectId: "amvibe-a22db",
        storageBucket: "amvibe-a22db.appspot.com",
        messagingSenderId: "717648312311",
        appId: "1:717648312311:web:c97e204d16e4211b9360f2"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      window.recaptchaVerifier = new RecaptchaVerifier("recaptcha-container", {
        size: "invisible",
        callback: (response) => {
          // reCAPTCHA solved
        },
      }, auth);

      let confirmationResult;

      window.sendOTP = () => {
        const phone = document.getElementById("phone").value;

        signInWithPhoneNumber(auth, phone, window.recaptchaVerifier)
          .then((result) => {
            confirmationResult = result;
            // OTP object retain करून पुढच्या पेजवर ठेवण्यासाठी sessionStorage वापरू
            window.sessionStorage.setItem("confirmationResult", JSON.stringify(result));
            window.location.href = "otp-verify.html";
          })
          .catch((error) => {
            console.error(error);
            alert("OTP पाठवताना त्रुटी आली");
          });
      };
    </script>
  </head>
  <body>
    <h3>तुझा फोन नंबर टाका:</h3>
    <input type="text" id="phone" placeholder="+91XXXXXXXXXX" />
    <div id="recaptcha-container"></div>
    <button onclick="sendOTP()">Send OTP</button>
  </body>
</html>
