<!DOCTYPE html>
<html>
<head>
  <title>OTP Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* तुमचं डिझाईन जसंच्या तसं ठेवलेलं */
    body {
      background: #000;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .otp-container {
      background: #121212;
      padding: 32px;
      border-radius: 8px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .otp-inputs {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 20px 0;
    }
    .otp-input {
      width: 50px;
      height: 50px;
      text-align: center;
      font-size: 20px;
      background: #121212;
      border: 1px solid #333;
      border-radius: 4px;
      color: white;
    }
    .btn {
      background: #1DB954;
      border: none;
      color: white;
      padding: 12px;
      width: 100%;
      border-radius: 500px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="otp-container">
    <h2>Enter Verification Code</h2>
    <p>We've sent a 6-digit code to your phone.</p>

    <div class="otp-inputs">
      <input type="text" class="otp-input" maxlength="1">
      <input type="text" class="otp-input" maxlength="1">
      <input type="text" class="otp-input" maxlength="1">
      <input type="text" class="otp-input" maxlength="1">
      <input type="text" class="otp-input" maxlength="1">
      <input type="text" class="otp-input" maxlength="1">
    </div>

    <button class="btn" onclick="verifyOTP()">Verify</button>
  </div>

  <!-- ✅ Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js"></script>

  <script>
    // ✅ Initialize Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2",
      measurementId: "G-WPV8M3E8K2"
    };
    firebase.initializeApp(firebaseConfig);

    // OTP input navigation
    const inputs = document.querySelectorAll('.otp-input');
    inputs.forEach((input, index) => {
      input.addEventListener('input', () => {
        if (input.value && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && input.value === '' && index > 0) {
          inputs[index - 1].focus();
        }
      });
    });

    // ✅ OTP Verify Function
    function verifyOTP() {
      let otp = '';
      inputs.forEach(input => otp += input.value);

      if (otp.length !== 6) {
        alert("Please enter 6-digit OTP");
        return;
      }

      if (!window.confirmationResult) {
        alert("OTP session expired. Please try again.");
        return;
      }

      window.confirmationResult.confirm(otp)
        .then(result => {
          console.log("✅ User signed in");
          window.location.href = "music-preference.html";
        })
        .catch(error => {
          console.error("❌ Invalid OTP:", error);
          alert("Invalid OTP. Please try again.");
        });
    }
  </script>
</body>
</html>
