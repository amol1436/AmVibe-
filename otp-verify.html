<!DOCTYPE html>
<html>
  <head>
    <title>OTP Verify</title>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
      import {
        getAuth,
        ConfirmationResult,
      } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
        authDomain: "amvibe-a22db.firebaseapp.com",
        projectId: "amvibe-a22db",
        storageBucket: "amvibe-a22db.appspot.com",
        messagingSenderId: "717648312311",
        appId: "1:717648312311:web:c97e204d16e4211b9360f2"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // confirmationResult मिळव
      let stored = window.sessionStorage.getItem("confirmationResult");
      let confirmationResult = null;

      // Firebase's workaround for rehydrating ConfirmationResult
      window.confirmationResult = confirmationResult = JSON.parse(stored);

      // actual confirm() फक्त result वर चालत नाही, म्हणून पुन्हा call करतो
      window.verifyOTP = () => {
        const code = document.getElementById("otp").value;
        auth
          .signInWithCredential(
            firebase.auth.PhoneAuthProvider.credential(
              confirmationResult.verificationId,
              code
            )
          )
          .then((result) => {
            alert("Login Success!");
            window.location.href = "home.html";
          })
          .catch((error) => {
            console.error("Verification failed:", error);
            alert("OTP चुकीचा आहे");
          });
      };
    </script>
  </head>
  <body>
    <h3>OTP टाका:</h3>
    <input type="text" id="otp" placeholder="Enter OTP" />
    <button onclick="verifyOTP()">Verify OTP</button>
  </body>
</html>
