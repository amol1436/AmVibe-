<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AmVibe - Sign Up</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Circular', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .signup-container {
      background-color: #121212;
      padding: 30px;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      width: 120px;
      display: block;
      margin: 0 auto 30px auto;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 25px;
      font-weight: 700;
      text-align: center;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #a7a7a7;
    }
    .input-group input {
      width: 100%;
      padding: 15px;
      border-radius: 4px;
      border: 1px solid #333;
      background: #2a2a2a;
      color: white;
      font-size: 16px;
    }
    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      border: none;
      color: white;
      background-color: #1DB954;
    }
    .login-link {
      margin-top: 20px;
      text-align: center;
      color: #a7a7a7;
    }
    .login-link a {
      color: #1DB954;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <img src="https://raw.githubusercontent.com/amol1436/AmVibe-/refs/heads/main/logo.png" alt="AmVibe Logo" class="logo">
    <h1>Sign Up for AmVibe</h1>
    
    <div class="input-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Enter your name">
    </div>
    
    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email">
    </div>
    
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Create a password">
    </div>
    
    <button class="btn" onclick="signUp()">Sign Up</button>
    
    <div class="login-link">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>

  <script>
    function signUp() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (!name || !email || !password) {
        alert('Please fill in all fields');
        return;
      }
      
      // Firebase authentication code will go here
      alert('Sign up successful! Welcome to AmVibe');
      // window.location.href = "home.html";
    }
  </script>
</body>
</html>
