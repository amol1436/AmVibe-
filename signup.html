<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AmVibe - Sign Up</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Circular', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .signup-container {
      background-color: #000;
      padding: 40px 32px;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }
    .logo {
      width: 120px;
      display: block;
      margin: 0 auto 30px auto;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 25px;
      text-align: center;
      font-weight: 700;
    }
    .input-field {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 18px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #121212;
      color: white;
      font-size: 16px;
    }
    .input-field::placeholder {
      color: #888;
    }
    .input-field:focus {
      outline: none;
      border-color: #1DB954;
      background-color: #181818;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      border: none;
      color: white;
      background-color: #1DB954;
      margin-top: 10px;
      transition: background-color 0.3s;
    }
    .btn:hover {
      background-color: #1ed760;
    }
    .login-link {
      margin-top: 20px;
      text-align: center;
      color: #a7a7a7;
      font-size: 14px;
    }
    .login-link a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <img src="https://raw.githubusercontent.com/amol1436/AmVibe-/refs/heads/main/logo.png" alt="AmVibe Logo" class="logo">
    <h1>Create Your Account</h1>
    
    <input type="text" class="input-field" id="name" placeholder="Full Name" />
    <input type="email" class="input-field" id="email" placeholder="Email Address" />
    <input type="password" class="input-field" id="password" placeholder="Password" />
    <input type="password" class="input-field" id="confirm-password" placeholder="Confirm Password" />
    
    <button class="btn" onclick="signUp()">Sign Up</button>
    
    <div class="login-link">
      Already have an account? <a href="email.html">Log in</a>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2",
      measurementId: "G-WPV8M3E8K2"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function signUp() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      
      if (!name || !email || !password || !confirmPassword) {
        alert('Please fill in all fields');
        return;
      }
      
      if (password !== confirmPassword) {
        alert('Passwords do not match');
        return;
      }
      
      if (password.length < 6) {
        alert('Password must be at least 6 characters');
        return;
      }
      
      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
      // 👉 पहिल्यांदा साइन अप केल्यावर flag सेट कर
     localStorage.setItem("firstTimeUser", "true");

     alert('Account created successfully!');
     window.location.href = "language-preference.html"; // भाषा निवडीचं पेज
     })
        .catch((error) => {
          let errorMessage = "Sign up failed: ";
          switch(error.code) {
            case 'auth/email-already-in-use':
              errorMessage += 'This email is already registered';
              break;
            case 'auth/invalid-email':
              errorMessage += 'Invalid email address';
              break;
            case 'auth/weak-password':
              errorMessage += 'Password is too weak';
              break;
            default:
              errorMessage += error.message;
          }
          alert(errorMessage);
        });
    }
  </script>
</body>
</html>
