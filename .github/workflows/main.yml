name: Show SHA-1 Fingerprint

on:
  workflow_dispatch:

jobs:
  get-sha1:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Generate SHA-1 from debug.keystore
        run: |
          keytool -list -v \
            -keystore $HOME/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android | grep SHA1
            
