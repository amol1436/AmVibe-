<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      font-family: 'Helvetica Neue', sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      background-color: #1DB954;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 20px;
    }

    .logo::before {
      content: "▶️";
      font-size: 36px;
      color: black;
    }

    h2 {
      margin-bottom: 30px;
      font-size: 22px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border: none;
      border-radius: 5px;
      background-color: #2a2a2a;
      color: #fff;
      font-size: 14px;
    }

    input::placeholder {
      color: #aaa;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 30px;
      background-color: #1DB954;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .bottom-text {
      margin-top: 20px;
      font-size: 14px;
      color: #b3b3b3;
    }

    .bottom-text a {
      color: #1DB954;
      text-decoration: none;
      font-weight: bold;
    }

    .bottom-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"></div>
    <h2>Log in to your account</h2>

    <input type="email" placeholder="Email Address" required />
    <input type="password" placeholder="Password" required />

    <button>Log In</button>

    <div class="bottom-text">
      Don't have an account? <a href="index.html">Sign up</a>
    </div>
  </div>
</body>
</html>
