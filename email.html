<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login with Email - AmVibe</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: 'Circular', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }
    .email-container {
      background-color: #121212;
      padding: 30px;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 15px;
      background-color: #1DB954;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      font-size: 15px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="email-container">
    <h2>Log in with Email</h2>
    <input type="email" id="email" placeholder="Enter email" />
    <input type="password" id="password" placeholder="Enter password" />
    <button onclick="loginWithEmail()">Login</button>
    <p style="margin-top: 20px; font-size: 14px;">Don't have an account? <a href="#" onclick="signUp()">Sign up</a></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2",
      measurementId: "G-WPV8M3E8K2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Login Function
    window.loginWithEmail = () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          alert("Login successful: " + user.email);
          // window.location.href = "home.html";
        })
        .catch((error) => {
          alert("Error: " + error.message);
        });
    };

    // SignUp Function
    window.signUp = () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          alert("Account created. Please log in.");
        })
        .catch((error) => {
          alert("Error: " + error.message);
        });
    };
  </script>
</body>
</html>
