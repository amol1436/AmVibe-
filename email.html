<!DOCTYPE html>
<html>
<head>
  <title>AmVibe - Email Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    body {
      background: #000; /* पूर्ण काळा बॅकग्राऊंड */
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .login-container {
      background: #121212; /* Spotify डार्क थीम */
      width: 100%;
      max-width: 450px;
      padding: 32px;
      border-radius: 8px;
      text-align: left;
      margin: 20px;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 32px;
      font-weight: 600;
    }
    
    .input-group {
      margin-bottom: 24px;
    }
    
    input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 16px;
      background: #121212;
      border: 1px solid #333;
      border-radius: 4px;
      color: white;
      font-size: 16px;
    }
    
    input:focus {
      outline: none;
      border-color: #1DB954;
    }
    
    .disclaimer {
      color: #a7a7a7;
      font-size: 11px;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      background: #1DB954; /* Spotify ग्रीन */
      color: white;
      border: none;
      border-radius: 500px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .btn:hover {
      background: #1ED760; /* हिरवा हलका */
    }
    
    .signup-link {
      color: #a7a7a7;
      font-size: 14px;
      text-align: center;
      margin-top: 24px;
    }
    
    .signup-link a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Log in to AmVibe</h1>
    
    <div class="input-group">
      <input type="email" id="email" placeholder="Email address">
      <input type="password" id="password" placeholder="Password">
    </div>
    
    <p class="disclaimer">
      By logging in, you agree to AmVibe's Terms and Conditions.
    </p>
    
    <button class="btn" onclick="login()">Log In</button>
    
    <p class="signup-link">
      Don't have an account? <a href="#">Sign up</a>
    </p>
  </div>

  <script>
    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      
      if (!email || !password) {
        alert("Please enter both email and password");
        return;
      }
      
      console.log("Login attempt with:", email);
      // Firebase लॉगिन कोड येथे जोडा
      // signInWithEmailAndPassword(auth, email, password)...
    }
  </script>
</body>
</html>
