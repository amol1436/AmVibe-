<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to AmVibe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Circular', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        
        .background-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(29, 185, 84, 0.03) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(29, 185, 84, 0.03) 0%, transparent 20%);
            z-index: 1;
        }
        
        .login-container {
            background-color: rgba(18, 18, 18, 0.95);
            padding: 50px 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
        }
        
        .logo {
            height: 60px;
            margin-bottom: 30px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(29, 185, 84, 0.3));
        }
        
        .login-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 40px;
            color: #fff;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #1DB954, #1ED760);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .form-group {
            margin-bottom: 30px;
            text-align: left;
        }
        
        .form-label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: #b3b3b3;
            font-size: 16px;
            letter-spacing: 0.5px;
        }
        
        .input-container {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #1DB954;
            font-size: 18px;
        }
        
        .form-input {
            width: 100%;
            padding: 18px 18px 18px 55px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        
        .form-input:focus {
            border-color: #1DB954;
            background: rgba(29, 185, 84, 0.05);
            box-shadow: 0 0 0 3px rgba(29, 185, 84, 0.2);
        }
        
        .login-btn {
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            background-color: #1DB954;
            color: #000;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
        }
        
        .login-btn:hover {
            background-color: #1ED760;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(29, 185, 84, 0.4);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .login-link {
            margin-top: 30px;
            font-size: 16px;
            color: #a7a7a7;
        }
        
        .login-link a {
            color: #1DB954;
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
            transition: all 0.2s;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 40px 0 30px;
            color: #777;
            font-size: 14px;
            font-weight: 500;
        }
        
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #333;
        }
        
        .divider span {
            padding: 0 15px;
        }
        
        .social-login {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .social-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .social-btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
        }
        
        .social-btn i {
            font-size: 24px;
        }
        
        .google-icon {
            color: #4285F4;
        }
        
        .facebook-icon {
            color: #1877F2;
        }
        
        .phone-icon {
            color: #1DB954;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 40px 25px;
                border-radius: 0;
                background: #121212;
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            
            body {
                padding: 0;
                background: #000;
            }
            
            .login-title {
                font-size: 28px;
            }
            
            .logo {
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="background-pattern"></div>
    
    <div class="login-container">
        <img src="https://raw.githubusercontent.com/amol1436/AmVibe-/refs/heads/main/logo.png" alt="AmVibe Logo" class="logo">
        
        <h1 class="login-title">Login to AmVibe</h1>
        
        <div class="form-group">
            <label class="form-label">Email</label>
            <div class="input-container">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" id="email" class="form-input" placeholder="Enter your email address">
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-container">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="password" class="form-input" placeholder="Enter your password">
            </div>
        </div>
        
        <button class="login-btn" id="login-btn">Login</button>
        
        <div class="divider">
            <span>or continue with</span>
        </div>
        
        <div class="social-login">
            <div class="social-btn" id="phone-login">
                <i class="fas fa-phone-alt phone-icon"></i>
            </div>
            <div class="social-btn" id="google-login">
                <i class="fab fa-google google-icon"></i>
            </div>
            <div class="social-btn" id="facebook-login">
                <i class="fab fa-facebook-f facebook-icon"></i>
            </div>
        </div>
        
        <div class="login-link">
            Don't have an account? <a href="#" id="signup-link">Sign up</a>
        </div>
    </div>

    <script>
        // Form validation
        document.getElementById('login-btn').addEventListener('click', function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('Please fill in both email and password fields');
                return;
            }
            
            // Simulate login process
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            this.disabled = true;
            
            setTimeout(() => {
                this.innerHTML = 'Login';
                this.disabled = false;
                alert('Login functionality will be implemented in the final version');
            }, 1500);
        });
        
        // Social login buttons
        document.getElementById('phone-login').addEventListener('click', function() {
            alert('Phone login will be implemented');
        });
        
        document.getElementById('google-login').addEventListener('click', function() {
            alert('Google login will be implemented');
        });
        
        document.getElementById('facebook-login').addEventListener('click', function() {
            alert('Facebook login will be implemented');
        });
        
        // Sign up link
        document.getElementById('signup-link').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Redirecting to sign up page...');
        });
    </script>
</body>
</html>
