<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In - AmVibe</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: 'Circular', sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 40px 30px;
      background-color: #121212;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      text-align: center;
    }

    .logo {
      width: 120px;
      margin: 0 auto 30px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 24px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      margin: 12px 0;
      border-radius: 6px;
      border: 1px solid #333;
      background: #000;
      color: white;
      font-size: 16px;
    }

    input::placeholder {
      color: #aaa;
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: #1DB954;
      color: white;
      font-weight: bold;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 20px;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #1ed760;
    }

    .bottom-text {
      margin-top: 20px;
      font-size: 14px;
      color: #b3b3b3;
    }

    .bottom-text a {
      color: #fff;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="https://raw.githubusercontent.com/amol1436/AmVibe-/refs/heads/main/logo.png" alt="Logo">
    <h1>Log in to your account</h1>
    <input type="email" id="email" placeholder="Email address" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Log In</button>
    <div class="bottom-text">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (!email || !password) {
        alert("Please enter both email and password.");
        return;
      }

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          alert("Login successful!");
          window.location.href = "home.html";
        })
        .catch((error) => {
          let message = "Login failed: ";
          switch (error.code) {
            case "auth/invalid-email":
              message += "Invalid email address.";
              break;
            case "auth/user-not-found":
              message += "User not found.";
              break;
            case "auth/wrong-password":
              message += "Wrong password.";
              break;
            default:
              message += error.message;
          }
          alert(message);
        });
    }
  </script>
</body>
</html>
