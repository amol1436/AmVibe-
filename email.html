<!DOCTYPE html>
<html>
<head>
  <title>AmVibe - Email Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      background: #000;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      background: #121212;
      width: 100%;
      max-width: 450px;
      padding: 32px;
      border-radius: 8px;
      text-align: left;
      margin: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 32px;
      font-weight: 600;
    }
    .input-group {
      margin-bottom: 24px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 16px;
      background: #121212;
      border: 1px solid #333;
      border-radius: 4px;
      color: white;
      font-size: 16px;
    }
    input:focus {
      outline: none;
      border-color: #1DB954;
    }
    .disclaimer {
      color: #a7a7a7;
      font-size: 11px;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #1DB954;
      color: white;
      border: none;
      border-radius: 500px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #1ED760;
    }
    .signup-link {
      color: #a7a7a7;
      font-size: 14px;
      text-align: center;
      margin-top: 24px;
    }
    .signup-link a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Log in to AmVibe</h1>
    
    <div class="input-group">
      <input type="email" id="email" placeholder="Email address">
      <input type="password" id="password" placeholder="Password">
    </div>
    
    <p class="disclaimer">
      By logging in, you agree to AmVibe's Terms and Conditions.
    </p>
    
    <button class="btn" onclick="login()">Log In</button>
    
    <p class="signup-link">
  Already have an account? <a href="email.html">Log in</a>
    </p>
    
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2",
      measurementId: "G-WPV8M3E8K2"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (!email || !password) {
        alert("Please enter both email and password");
        return;
      }

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          alert("Login successful!");
          window.location.href = "home.html";
        })
        .catch((error) => {
          let errorMessage = "Login failed: ";
          switch (error.code) {
            case 'auth/user-not-found':
              errorMessage += "No user found with this email.";
              break;
            case 'auth/wrong-password':
              errorMessage += "Incorrect password.";
              break;
            case 'auth/invalid-email':
              errorMessage += "Invalid email format.";
              break;
            default:
              errorMessage += error.message;
          }
          alert(errorMessage);
        });
    }
  </script>
</body>
</html>
