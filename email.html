<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Circular", -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .signup-container {
      width: 300px;
    }
    h1 {
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 20px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      background: #1db954;
      color: white;
    }
    .phone {
      background: transparent;
      border: 1px solid #878787;
    }
    .google {
      background: #4285F4;
    }
    .facebook {
      background: #1877F2;
    }
    .divider {
      margin: 20px 0;
      color: #878787;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <h1>Sign up to start listening</h1>
    <button class="signup-free">Sign up for free</button>
    <div class="divider">Or continue with</div>
    <button class="phone">Continue with phone number</button>
    <button class="google">Continue with Google</button>
    <button class="facebook">Continue with Facebook</button>
  </div>
</body>
</html>
