<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMVibe Login</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      color: #fff;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
      max-width: 400px;
      margin: auto;
    }

    .logo {
      width: 100px;
      height: 100px;
      margin: 40px auto 20px;
      background: #1db954;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo:before {
      content: '▶️';
      font-size: 40px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 20px 0 10px;
    }

    p {
      font-size: 20px;
      margin: 0 0 30px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
    }

    .btn-green {
      background-color: #1db954;
      color: #000;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
    }

    .btn img {
      width: 20px;
      height: 20px;
      margin-right: 12px;
    }

    .login-link {
      margin-top: 30px;
      font-size: 14px;
    }

    .login-link a {
      color: #1db954;
      text-decoration: none;
    }

    .btn-outline:hover, .btn-green:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"></div>
    <h1>Millions of songs.</h1>
    <p>Free on AMVibe.</p>

    <button class="btn btn-green">Sign up for free</button>

    <button class="btn btn-outline">
      <img src="https://img.icons8.com/color/48/000000/google-logo.png" alt="Google" />
      Continue with Google
    </button>

    <button class="btn btn-outline">
      <img src="https://img.icons8.com/fluency/48/000000/facebook-new.png" alt="Facebook" />
      Continue with Facebook
    </button>

    <button class="btn btn-outline">
      <img src="https://img.icons8.com/fluency/48/phone.png" alt="Phone" />
      Continue with Phone number
    </button>

    <div class="login-link">
      Already have an account? <a href="#">Log in</a>
    </div>
  </div>
</body>
</html>
