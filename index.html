<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmVibe - Log In</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Circular', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }
    .login-container {
      background-color: #121212;
      padding: 30px;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      width: 120px;
      display: block;
      margin: 0 auto 30px auto;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 25px;
      font-weight: 700;
    }
    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      margin-bottom: 15px;
      border: none;
      color: white;
      transition: all 0.3s;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-email {
      background-color: #1DB954;
    }
    .btn-other {
      background: transparent;
      border: 1px solid #878787;
    }
    .icon {
      width: 18px;
      height: 18px;
    }
    .phone-icon {
      font-size: 18px;
    }
    .signup-link {
      margin-top: 20px;
      font-size: 15px;
      color: #a7a7a7;
    }
    .signup-link a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }
    @media (max-width: 480px) {
      .login-container {
        padding: 25px 20px;
        border-radius: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      body {
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="https://raw.githubusercontent.com/amol1436/AmVibe-/refs/heads/main/logo.png" alt="AmVibe Logo" class="logo" />
    <h1>Log in to AmVibe</h1>

    <button class="btn btn-email" onclick="window.location.href='email.html'">
      Continue with email
    </button>

    <button class="btn btn-other" onclick="window.location.href='phone.html'">
      <span class="phone-icon">📱</span>
      Continue with phone number
    </button>

    <button class="btn btn-other" onclick="loginWithGoogle()">
      <!-- Google SVG Icon -->
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 533.5 544.3">
        <path fill="#4285F4" d="M533.5 278.4c0-17.7-1.4-35-4-51.7H272v97.9h146.9c-6.4 34.8-25.8 64.3-55 84l89.1 69.4c52-47.9 80.5-118.6 80.5-199.6z"/>
        <path fill="#34A853" d="M272 544.3c72.6 0 133.6-23.9 178.1-64.9l-89.1-69.4c-24.7 16.6-56.3 26.4-89 26.4-68.3 0-126-46-146.7-108.2l-90.8 70c42.7 84.2 130.5 145.1 237.5 145.1z"/>
        <path fill="#FBBC05" d="M125.3 328.2c-10.1-30.2-10.1-62.5 0-92.7l-90.8-70c-39.6 77.8-39.6 168.5 0 246.3l90.8-70z"/>
        <path fill="#EA4335" d="M272 107.7c37.7 0 71.6 13 98.2 34.9l73.5-73.5C405.6 24.8 344.6 0 272 0 165 0 77.2 60.9 34.5 145.1l90.8 70C146 153.7 203.7 107.7 272 107.7z"/>
      </svg>
      Continue with Google
    </button>

    <p class="signup-link">Don't have an account? <a href="signup.html">Sign up</a></p>
  </div>

  <!-- Firebase Integration -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2",
      measurementId: "G-WPV8M3E8K2"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    window.loginWithGoogle = () => {
      auth.signInWithPopup(provider)
        .then((result) => {
          const user = result.user;
          alert("Login successful! Welcome " + user.displayName);
          // window.location.href = "home.html";
        })
        .catch((error) => {
          alert("Login failed: " + error.message);
        });
    };
  </script>
</body>
</html>
