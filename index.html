<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmVibe - Sign Up</title>
  <style>
    body {
      margin: 0;
      font-family: 'Circular', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #000;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 100px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 40px;
    }

    .btn {
      width: 100%;
      max-width: 300px;
      padding: 14px 20px;
      margin-bottom: 15px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      transition: all 0.3s;
    }

    .btn-signup {
      background-color: #1DB954;
      color: black;
    }

    .btn-other {
      background: transparent;
      border: 1px solid #878787;
      color: white;
    }

    .icon {
      height: 18px;
      width: 18px;
    }

    .footer {
      margin-top: 25px;
      font-size: 14px;
      color: #b3b3b3;
    }

    .footer a {
      color: #1DB954;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/amol1436/AmVibe-/refs/heads/main/logo.png" alt="AmVibe Logo" class="logo" />

  <h1>Millions of songs.<br />Free on AMVibe.</h1>

  <button class="btn btn-signup" onclick="window.location.href='signup.html'">
    Sign up for free
  </button>

  <button class="btn btn-other" onclick="loginWithGoogle()">
    <img src="https://www.google.com/favicon.ico" class="icon" alt="Google" />
    Continue with Google
  </button>

  <button class="btn btn-other" onclick="window.location.href='phone.html'">
    <span class="icon">📱</span>
    Continue with phone number
  </button>

  <div class="footer">
    Already have an account? <a href="email.html">Log in</a>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2",
      measurementId: "G-WPV8M3E8K2"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    function loginWithGoogle() {
      auth.signInWithPopup(provider)
        .then(result => {
          alert("Welcome " + result.user.displayName);
        })
        .catch(error => {
          alert("Login failed: " + error.message);
        });
    }
  </script>
</body>
</html>
