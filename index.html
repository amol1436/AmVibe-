<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmVibe - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Circular', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }
    .login-container {
      background-color: #121212;
      padding: 30px;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      width: 120px;
      display: block;
      margin: 0 auto 30px auto;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 25px;
      font-weight: 700;
    }
    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      margin-bottom: 15px;
      border: none;
      color: white;
      transition: all 0.3s;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-email {
      background-color: #1DB954;
    }
    .btn-other {
      background: transparent;
      border: 1px solid #878787;
    }
    .icon {
      width: 18px;
      height: 18px;
    }
    .signup-link {
      margin-top: 20px;
      font-size: 15px;
      color: #a7a7a7;
    }
    .signup-link a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }
    #phone-login {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="https://raw.githubusercontent.com/amol1436/AmVibe-/refs/heads/main/logo.png" class="logo" alt="AmVibe Logo" />
    <h1>Log in to AmVibe</h1>

    <button class="btn btn-email" onclick="loginWithEmail()">Continue with Email</button>

    <button class="btn btn-other" onclick="togglePhoneLogin()">
      📱 Continue with Phone Number
    </button>

    <button class="btn btn-other" onclick="loginWithGoogle()">
      <img src="https://www.google.com/favicon.ico" class="icon" alt="Google" />
      Continue with Google
    </button>

    <div id="phone-login" style="display: none;">
      <input type="text" id="phone-number" placeholder="+91XXXXXXXXXX" /><br /><br />
      <div id="recaptcha-container"></div><br />
      <button onclick="sendOTP()">Send OTP</button><br /><br />
      <input type="text" id="otp" placeholder="Enter OTP" /><br /><br />
      <button onclick="verifyOTP()">Verify OTP</button>
    </div>

    <p class="signup-link">Don't have an account? <a href="#">Sign up</a></p>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      RecaptchaVerifier,
      signInWithPopup,
      signInWithPhoneNumber
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2",
      measurementId: "G-WPV8M3E8K2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Google Login
    window.loginWithGoogle = () => {
      const provider = new GoogleAuthProvider();
      signInWithPopup(auth, provider)
        .then((result) => {
          alert("Login successful! Welcome " + result.user.displayName);
        })
        .catch((error) => {
          alert("Login failed: " + error.message);
        });
    };

    // Email Login (फक्त alert दाखवतो)
    window.loginWithEmail = () => alert("Email login selected");

    // Phone login toggle
    window.togglePhoneLogin = () => {
      const phoneLogin = document.getElementById("phone-login");
      phoneLogin.style.display = phoneLogin.style.display === "none" ? "block" : "none";
    };

    // reCAPTCHA
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
      size: 'normal',
      callback: () => {
        console.log('reCAPTCHA solved');
      }
    });

    // Send OTP
    window.sendOTP = () => {
      const phoneNumber = document.getElementById("phone-number").value;
      const appVerifier = window.recaptchaVerifier;

      signInWithPhoneNumber(auth, phoneNumber, appVerifier)
        .then((confirmationResult) => {
          window.confirmationResult = confirmationResult;
          alert("OTP Sent!");
        })
        .catch((error) => {
          alert("Error: " + error.message);
        });
    };

    // Verify OTP
    window.verifyOTP = () => {
      const otp = document.getElementById("otp").value;
      window.confirmationResult.confirm(otp)
        .then((result) => {
          alert("Login successful! Phone: " + result.user.phoneNumber);
        })
        .catch((error) => {
          alert("Invalid OTP: " + error.message);
        });
    };
  </script>
</body>
</html>
