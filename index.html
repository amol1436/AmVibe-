<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AmVibe - Music Streaming</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Circular', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    
    body {
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
      background: radial-gradient(circle at center, #121212 0%, #000 100%);
      overflow: hidden;
    }
    
    .login-container {
      background-color: rgba(18, 18, 18, 0.95);
      padding: 40px 35px;
      border-radius: 12px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
      position: relative;
      z-index: 2;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .logo-container {
      margin-bottom: 30px;
    }
    
    .logo {
      height: 50px;
      margin-bottom: 15px;
    }
    
    .tagline {
      font-size: 18px;
      color: #b3b3b3;
      font-weight: 500;
      margin-bottom: 5px;
      letter-spacing: 0.5px;
    }
    
    .sub-tagline {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 35px;
      letter-spacing: -0.5px;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    
    .signup-btn {
      width: 100%;
      padding: 18px;
      border-radius: 500px;
      background-color: #1DB954;
      color: #000;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.5px;
      border: none;
      cursor: pointer;
      margin-bottom: 25px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
    }
    
    .signup-btn:hover {
      background-color: #1ED760;
      transform: scale(1.02);
      box-shadow: 0 6px 20px rgba(29, 185, 84, 0.4);
    }
    
    .signup-btn:active {
      transform: scale(0.98);
    }
    
    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: #777;
      font-size: 14px;
      font-weight: 500;
    }
    
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      border-bottom: 1px solid #333;
    }
    
    .divider span {
      padding: 0 15px;
    }
    
    .login-option {
      width: 100%;
      padding: 16px;
      border-radius: 500px;
      background-color: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      cursor: pointer;
      margin-bottom: 15px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    
    .login-option:hover {
      background-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }
    
    .login-option:active {
      transform: translateY(0);
    }
    
    .login-option i {
      font-size: 18px;
    }
    
    .google-icon {
      width: 20px;
      height: 20px;
      background: conic-gradient(from -45deg, #ea4335 110deg, #4285f4 90deg 180deg, #34a853 180deg 270deg, #fbbc05 270deg) 73% 55%/150% 150% no-repeat;
      border-radius: 50%;
    }
    
    .facebook-icon {
      color: #1877F2;
      font-size: 20px;
    }
    
    .phone-icon {
      color: #1DB954;
    }
    
    .login-link {
      margin-top: 30px;
      font-size: 16px;
      color: #a7a7a7;
    }
    
    .login-link a {
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      margin-left: 5px;
      transition: all 0.2s;
    }
    
    .login-link a:hover {
      color: #1DB954;
      text-decoration: underline;
    }
    
    .background-animation {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      overflow: hidden;
    }
    
    .circle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(29,185,84,0.1) 0%, rgba(29,185,84,0) 70%);
    }
    
    .circle-1 {
      width: 300px;
      height: 300px;
      top: -100px;
      right: -100px;
    }
    
    .circle-2 {
      width: 200px;
      height: 200px;
      bottom: -50px;
      left: -50px;
    }
    
    .circle-3 {
      width: 150px;
      height: 150px;
      top: 40%;
      left: 10%;
    }
    
    @media (max-width: 480px) {
      .login-container {
        padding: 35px 25px;
        border-radius: 0;
      }
      
      body {
        padding: 0;
        background: #000;
      }
      
      .sub-tagline {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="background-animation">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>
  
  <div class="login-container">
    <div class="logo-container">
      <img src="https://raw.githubusercontent.com/amol1436/AmVibe-/refs/heads/main/logo.png" alt="AmVibe Logo" class="logo">
      <p class="tagline">Millions of songs. Free on AMVibe.</p>
    </div>
    
    <p class="sub-tagline">Sign up for free</p>
    
    <button class="signup-btn">Sign up for free</button>
    
    <div class="divider">
      <span>or continue with</span>
    </div>
    
    <button class="login-option">
      <i class="fas fa-phone-alt phone-icon"></i>
      Continue with phone number
    </button>
    
    <button class="login-option">
      <div class="google-icon"></div>
      Continue with Google
    </button>
    
    <button class="login-option">
      <i class="fab fa-facebook facebook-icon"></i>
      Continue with Facebook
    </button>
    
    <div class="login-link">
      Already have an account? <a href="#">Log in</a>
    </div>
  </div>
  
  <script>
    // Simple animation for background circles
    document.addEventListener('DOMContentLoaded', function() {
      const circles = document.querySelectorAll('.circle');
      let x = 0, y = 0;
      
      function moveCircles() {
        circles.forEach((circle, index) => {
          const speed = 0.002 * (index + 1);
          const offsetX = Math.sin(Date.now() * speed + index) * 5;
          const offsetY = Math.cos(Date.now() * speed + index) * 5;
          circle.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
        });
        requestAnimationFrame(moveCircles);
      }
      
      moveCircles();
    });
  </script>
</body>
</html>
