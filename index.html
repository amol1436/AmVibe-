<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AmVibe - Sign Up</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Circular', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
      background: linear-gradient(to bottom, #1a1a1a, #000000);
    }
    .login-container {
      background-color: rgba(18, 18, 18, 0.8);
      padding: 40px 30px;
      border-radius: 12px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    .app-title {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #1DB954, #1ED760);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }
    .tagline {
      font-size: 18px;
      color: #b3b3b3;
      margin-bottom: 35px;
      font-weight: 500;
    }
    .btn {
      width: 100%;
      padding: 17px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 15px;
      border: none;
      color: white;
      transition: all 0.3s ease;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn:hover {
      transform: scale(1.02);
      background: rgba(255, 255, 255, 0.15);
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-signup {
      background-color: #1DB954;
      border: none;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
    }
    .btn-signup:hover {
      background-color: #1ED760;
      box-shadow: 0 6px 20px rgba(29, 185, 84, 0.4);
    }
    .icon {
      width: 20px;
      height: 20px;
      display: block;
    }
    .phone-icon {
      font-size: 20px;
    }
    .login-link {
      margin-top: 25px;
      font-size: 16px;
      color: #a0a0a0;
    }
    .login-link a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      margin-left: 5px;
      transition: all 0.2s;
    }
    .login-link a:hover {
      color: #1DB954;
      text-decoration: underline;
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: #777;
    }
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      border-bottom: 1px solid #444;
    }
    .divider span {
      padding: 0 15px;
      font-size: 14px;
    }
    @media (max-width: 480px) {
      .login-container {
        padding: 30px 20px;
        min-height: auto;
        border-radius: 0;
        background: rgba(18, 18, 18, 0.95);
      }
      body {
        padding: 0;
        background: #000;
      }
      .app-title {
        font-size: 28px;
      }
      .tagline {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1 class="app-title">AMVibe</h1>
    <p class="tagline">Millions of songs. Free on AMVibe..</p>
    
    <button class="btn btn-signup">
      Sign up for free
    </button>
    
    <div class="divider"><span>or continue with</span></div>
    
    <button class="btn">
      <span class="phone-icon">📱</span>
      Continue with phone number
    </button>
    
    <button class="btn">
      <img src="https://www.gstatic.com/images/branding/googleg/1x/googleg_standard_color_32dp.png" class="icon" alt="Google" />
      Continue with Google
    </button>
    
    <button class="btn">
      <svg class="icon" viewBox="0 0 24 24" fill="#1877F2">
        <path d="M22.675 0H1.325C0.593 0 0 0.593 0 1.325v21.351C0 23.407 0.593 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463 0.099 2.795 0.143v3.24l-1.918 0.001c-1.504 0-1.795 0.715-1.795 1.763v2.313h3.587l-0.467 3.622h-3.12V24h6.116c0.73 0 1.323-0.593 1.323-1.325V1.325C24 0.593 23.407 0 22.675 0z"/>
      </svg>
      Continue with Facebook
    </button>

    <div class="login-link">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>
</body>
</html>
