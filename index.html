<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AMVibe</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", sans-serif;
      background-color: black;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .logo {
      width: 100px;
      margin-bottom: 20px;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      margin: 10px 0;
    }

    .subtitle {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 40px;
    }

    .btn {
      width: 300px;
      padding: 14px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      margin: 10px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
    }

    .signup-btn {
      background-color: #1ed760;
      color: black;
      border: none;
    }

    .google-btn,
    .facebook-btn,
    .phone-btn {
      background-color: transparent;
      border: 1.5px solid white;
      color: white;
    }

    .google-icon,
    .facebook-icon,
    .phone-icon {
      width: 22px;
      height: 22px;
    }

    .login-link {
      margin-top: 30px;
      font-size: 14px;
      color: white;
    }

    .login-link a {
      color: #1ed760;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Spotify_icon.svg" alt="AMVibe Logo" />

  <div class="title">Millions of songs.</div>
  <div class="subtitle">Free on AMVibe.</div>

  <button class="btn signup-btn">Sign up for free</button>

  <button class="btn phone-btn">
    <img class="phone-icon" src="https://img.icons8.com/ios-filled/50/ffffff/phone.png" alt="Phone" />
    Continue with phone number
  </button>

  <button class="btn google-btn">
    <img class="google-icon" src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" />
    Continue with Google
  </button>

  <button class="btn facebook-btn">
    <img class="facebook-icon" src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="Facebook" />
    Continue with Facebook
  </button>

  <div class="login-link">
    Already have an account? <a href="#">Log in</a>
  </div>
</body>
</html>
