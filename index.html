<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AmVibe Login</title>
  <style>
    body {
      margin: 0;
      background-color: #000;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background-color: #111;
      padding: 30px;
      border-radius: 10px;
      width: 90%;
      max-width: 350px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background-color: #222;
      border: none;
      border-radius: 5px;
      color: white;
    }
    .btn {
      background-color: #1DB954;
      color: white;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 10px;
    }
    .toggle-text {
      text-align: center;
      margin-top: 15px;
      color: #aaa;
    }
    .toggle-text a {
      color: #1DB954;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loginForm">
      <h2>Log in to AmVibe</h2>
      <input type="email" placeholder="Email address">
      <input type="password" placeholder="Password">
      <button class="btn">Log In</button>
      <div class="toggle-text">Don't have an account? <a onclick="toggleForm()">Sign up</a></div>
    </div>

    <div id="signupForm" style="display: none;">
      <h2>Sign up to AmVibe</h2>
      <input type="text" placeholder="Full name">
      <input type="email" placeholder="Email address">
      <input type="password" placeholder="Password">
      <button class="btn">Sign Up</button>
      <div class="toggle-text">Already have an account? <a onclick="toggleForm()">Log in</a></div>
    </div>
  </div>

  <script>
    function toggleForm() {
      const login = document.getElementById("loginForm");
      const signup = document.getElementById("signupForm");
      if (login.style.display === "none") {
        login.style.display = "block";
        signup.style.display = "none";
      } else {
        login.style.display = "none";
        signup.style.display = "block";
      }
    }
  </script>
</body>
</html>
