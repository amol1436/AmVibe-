<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AmVibe - Log In / Sign Up</title>
  <style>
    /* CSS same as yours, extra styles for hiding forms */
    .hidden { display: none; }
    /* ... बाकी CSS तुमच्या कोडप्रमाणेच ठेवा ... */
  </style>
</head>
<body>
  <div class="login-container">
    <img src="https://raw.githubusercontent.com/amol1436/AmVibe-/refs/heads/main/logo.png" alt="Logo" class="logo" />
    
    <!-- SIGN UP FORM -->
    <div id="signup-form">
      <h1>Sign up to start listening</h1>
      <button class="btn btn-email" onclick="alert('Sign up with Email')">📧 Sign up for free</button>
      <button class="btn btn-other" onclick="alert('Sign up with Phone')">📱 Continue with phone number</button>
      <button class="btn btn-other" onclick="loginWithGoogle()">
        <img src="https://www.google.com/favicon.ico" class="icon" alt="Google" /> Continue with Google
      </button>
      <button class="btn btn-other" onclick="loginWithFacebook()">
        <img src="https://www.facebook.com/favicon.ico" class="icon" alt="Facebook" /> Continue with Facebook
      </button>
      <div class="login-link">
        Already have an account? <a href="#" onclick="showLogin()">Log in</a>
      </div>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form" class="hidden">
      <h1>Log in to your account</h1>
      <button class="btn btn-email" onclick="alert('Login with Email')">📧 Log in with email</button>
      <button class="btn btn-other" onclick="alert('Login with Phone')">📱 Log in with phone number</button>
      <button class="btn btn-other" onclick="loginWithGoogle()">
        <img src="https://www.google.com/favicon.ico" class="icon" alt="Google" /> Continue with Google
      </button>
      <button class="btn btn-other" onclick="loginWithFacebook()">
        <img src="https://www.facebook.com/favicon.ico" class="icon" alt="Facebook" /> Continue with Facebook
      </button>
      <div class="login-link">
        Don't have an account? <a href="#" onclick="showSignup()">Sign up for free</a>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function loginWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then(result => alert("Welcome, " + result.user.displayName))
        .catch(error => alert("Google Login Error: " + error.message));
    }

    function loginWithFacebook() {
      const provider = new firebase.auth.FacebookAuthProvider();
      auth.signInWithPopup(provider)
        .then(result => alert("Welcome, " + result.user.displayName))
        .catch(error => alert("Facebook Login Error: " + error.message));
    }

    // 🔁 Toggle Functions
    function showLogin() {
      document.getElementById('signup-form').classList.add('hidden');
      document.getElementById('login-form').classList.remove('hidden');
    }

    function showSignup() {
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('signup-form').classList.remove('hidden');
    }
  </script>
</body>
</html>
