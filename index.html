<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AmVibe - Login</title>

  <!-- Firebase JS SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <style>
    body {
      background-color: #000;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
    }

    .logo {
      width: 100px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #aaa;
      margin-bottom: 30px;
    }

    .green-btn {
      background-color: #1DB954;
      color: black;
      padding: 15px;
      border-radius: 30px;
      border: none;
      width: 100%;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .social-btn {
      background: transparent;
      border: 1px solid white;
      color: white;
      padding: 12px;
      border-radius: 30px;
      width: 100%;
      margin-bottom: 15px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
    }

    .social-btn .icon {
      width: 20px;
      height: 20px;
    }

    .login-text {
      margin-top: 30px;
      color: #ccc;
    }

    .login-text a {
      color: #1DB954;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://i.imgur.com/wSTFkRM.png" alt="Logo" class="logo" />
    <h1>Millions of songs.</h1>
    <p class="subtitle">Free on AMVibe.</p>

    <button class="green-btn">Sign up for free</button>

    <button class="social-btn" onclick="phoneLogin()">
      📞 Continue with Phone Number
    </button>

    <button class="social-btn" onclick="googleLogin()">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" class="icon" />
      Continue with Google
    </button>

    <button class="social-btn">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" class="icon" />
      Continue with Facebook
    </button>

    <p class="login-text">Already have an account? <a href="#">Log in</a></p>
  </div>

  <script>
    // Firebase config इथे तुमचं टाका
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      appId: "YOUR_APP_ID",
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function googleLogin() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then((result) => {
          alert("Logged in as: " + result.user.displayName);
        })
        .catch((error) => {
          alert(error.message);
        });
    }

    function phoneLogin() {
      window.location.href = "phone.html";
    }
  </script>
</body>
</html>
