<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmVibe Login</title>
  <script type="module">
    // Firebase import
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      RecaptchaVerifier,
      signInWithPhoneNumber
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2",
      measurementId: "G-WPV8M3E8K2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Google Login
    document.getElementById("googleBtn").addEventListener("click", () => {
      const provider = new GoogleAuthProvider();
      signInWithPopup(auth, provider)
        .then((result) => {
          alert("Logged in as: " + result.user.displayName);
        })
        .catch((error) => {
          alert("Google Login Error: " + error.message);
        });
    });

    // Phone Login Setup
    window.recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha-container", {
      size: "normal",
      callback: (response) => {
        console.log("reCAPTCHA verified");
      },
    });

    document.getElementById("sendOtpBtn").addEventListener("click", () => {
      const phoneNumber = document.getElementById("phone").value;
      const appVerifier = window.recaptchaVerifier;

      signInWithPhoneNumber(auth, phoneNumber, appVerifier)
        .then((confirmationResult) => {
          window.confirmationResult = confirmationResult;
          alert("OTP Sent!");
        })
        .catch((error) => {
          alert("Error: " + error.message);
        });
    });

    document.getElementById("verifyOtpBtn").addEventListener("click", () => {
      const code = document.getElementById("otp").value;
      window.confirmationResult.confirm(code)
        .then((result) => {
          alert("Phone Login Success: " + result.user.phoneNumber);
        })
        .catch((error) => {
          alert("Invalid OTP");
        });
    });
  </script>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: sans-serif;
      padding: 20px;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      background-color: #1db954;
      color: white;
      border-radius: 5px;
    }
    input {
      margin: 5px;
      padding: 10px;
      border-radius: 4px;
      border: none;
      font-size: 16px;
    }
    .section {
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <h1>🎵 AmVibe Login</h1>

  <div class="section">
    <button id="googleBtn">Continue with Google</button>
  </div>

  <div class="section">
    <input type="text" id="phone" placeholder="+91XXXXXXXXXX" />
    <div id="recaptcha-container"></div>
    <button id="sendOtpBtn">Send OTP</button>
  </div>

  <div class="section">
    <input type="text" id="otp" placeholder="Enter OTP" />
    <button id="verifyOtpBtn">Verify OTP</button>
  </div>
</body>
</html>
