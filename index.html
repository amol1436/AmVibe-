<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmVibe - Sign Up</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Circular', sans-serif;
    }
    body {
      background-color: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }
    .logo {
      width: 100px;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    h2 {
      font-size: 18px;
      color: #a7a7a7;
      margin-bottom: 40px;
    }
    .btn {
      width: 100%;
      max-width: 350px;
      padding: 15px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      margin-bottom: 15px;
      border: none;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: 0.3s;
    }
    .btn-green {
      background-color: #1DB954;
      color: white;
    }
    .btn-outline {
      background-color: transparent;
      border: 1px solid #878787;
      color: white;
    }
    .icon {
      width: 20px;
      height: 20px;
    }
    .footer {
      margin-top: 20px;
      font-size: 15px;
      color: #a7a7a7;
    }
    .footer a {
      color: #1DB954;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <img class="logo" src="https://raw.githubusercontent.com/amol1436/AmVibe-/refs/heads/main/logo.png" alt="AmVibe Logo" />
  <h1>Millions of songs.</h1>
  <h2>Free on AMVibe.</h2>

  <button class="btn btn-green" onclick="window.location.href='signup.html'">
    Sign up for free
  </button>

  <button class="btn btn-outline" onclick="loginWithGoogle()">
    <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" />
    Continue with Google
  </button>

  <button class="btn btn-outline">
    <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" alt="Facebook" />
    Continue with Facebook
  </button>

  <div class="footer">
    Already have an account? <a href="email.html">Log in</a>
  </div>

  <!-- Firebase JS -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    function loginWithGoogle() {
      auth.signInWithPopup(provider)
        .then((result) => {
          const user = result.user;
          alert("Welcome " + user.displayName);
          // window.location.href = "home.html";
        })
        .catch((error) => {
          alert("Google login failed: " + error.message);
        });
    }
  </script>
</body>
</html>
