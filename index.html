<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmVibe - Log In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Circular', 'Segoe UI', sans-serif;
        }
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .login-container {
            background-color: #121212;
            padding: 32px;
            border-radius: 8px;
            width: 340px;
        }
        .logo {
            width: 140px;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: 700;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 500px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 16px;
            border: none;
            color: white;
            transition: all 0.3s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-email {
            background-color: #1DB954; /* Spotify Green */
        }
        .btn-email:hover {
            background-color: #1ed760; /* Lighter Green */
        }
        .btn-other {
            background: transparent;
            border: 1px solid #878787;
        }
        .btn-other:hover {
            border-color: #fff;
        }
        .icon {
            width: 20px;
            height: 20px;
            display: block; /* Fix for broken image */
        }
        .phone-icon {
            font-size: 20px;
        }
        .signup-link {
            margin-top: 24px;
            font-size: 16px;
            color: #a7a7a7;
        }
        .signup-link a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            margin-left: 4px;
        }
        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo from GitHub -->
        <img src="https://raw.githubusercontent.com/amol1436/AmVibe-/refs/heads/main/logo.png" alt="AmVibe Logo" class="logo">
        
        <h1>Log in to AmVibe</h1>
        
        <!-- Login Options -->
        <button class="btn btn-email" onclick="loginWithEmail()">Continue with email</button>
        
        <button class="btn btn-other" onclick="loginWithPhone()">
            <span class="phone-icon">📱</span>
            Continue with phone number
        </button>
        
        <button class="btn btn-other" onclick="loginWithGoogle()">
            <img src="https://www.google.com/favicon.ico" class="icon" alt="Google"> <!-- Fixed Google Icon -->
            Continue with Google
        </button>
        
        <button class="btn btn-other" onclick="loginWithFacebook()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" class="icon" alt="Facebook">
            Continue with Facebook
        </button>
        
        <!-- Signup Link -->
        <p class="signup-link">Don't have an account?<a href="#">Sign up</a></p>
    </div>

    <script>
        // Demo Functions
        function loginWithEmail() {
            alert("Email login selected");
        }
        function loginWithPhone() {
            alert("Phone login selected");
        }
        function loginWithGoogle() {
            alert("Google login selected");
        }
        function loginWithFacebook() {
            alert("Facebook login selected");
        }
    </script>
</body>
</html>
