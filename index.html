<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMVibe Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: white;
      font-family: 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 30px 20px;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 40px;
    }

    .btn {
      width: 100%;
      max-width: 320px;
      padding: 12px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid white;
      background-color: transparent;
      color: white;
    }

    .btn-green {
      background-color: #1ed760;
      border: none;
      color: black;
    }

    .btn img {
      width: 18px;
      height: 18px;
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #ccc;
    }

    .footer a {
      color: #1ed760;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <!-- Logo -->
  <img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Spotify_icon.svg" alt="Logo" class="logo" />

  <!-- Title -->
  <h1>Sign up to start listening</h1>

  <!-- Buttons -->
  <button class="btn btn-green">
    <img src="https://img.icons8.com/ios-filled/50/000000/new-post.png" alt="Email" />
    Sign up for free
  </button>

  <button class="btn">
    <img src="https://img.icons8.com/ios-filled/50/ffffff/phone.png" alt="Phone" />
    Continue with phone number
  </button>

  <button class="btn">
    <img src="https://img.icons8.com/color/48/000000/google-logo.png" alt="Google" />
    Continue with Google
  </button>

  <button class="btn">
    <img src="https://img.icons8.com/fluency/48/facebook-new.png" alt="Facebook" />
    Continue with Facebook
  </button>

  <!-- Footer -->
  <div class="footer">
    Already have an account? <a href="#">Log in</a>
  </div>
</body>
</html>
