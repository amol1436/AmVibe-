<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmVibe - Sign Up</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Circular', sans-serif;
    }
    body {
      background-color: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }
    .logo {
      width: 100px;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    h2 {
      font-size: 18px;
      color: #a7a7a7;
      margin-bottom: 40px;
    }
    .btn {
      width: 100%;
      max-width: 350px;
      padding: 15px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      margin-bottom: 15px;
      border: none;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: 0.3s;
    }
    .btn-green {
      background-color: #1DB954;
      color: white;
    }
    .btn-outline {
      background-color: transparent;
      border: 1px solid #878787;
      color: white;
    }
    .icon {
      width: 20px;
      height: 20px;
    }
    .footer {
      margin-top: 20px;
      font-size: 15px;
      color: #a7a7a7;
    }
    .footer a {
      color: #1DB954;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <img class="logo" src="https://raw.githubusercontent.com/amol1436/AmVibe-/refs/heads/main/logo.png" alt="AmVibe Logo" />
  <h1>Millions of songs.</h1>
  <h2>Free on AMVibe.</h2>

  <button class="btn btn-green" onclick="window.location.href='signup.html'">
    Sign up for free
  </button>

  <!-- Transparent Google Login Button -->
<button class="btn btn-other" onclick="loginWithGoogle()">
  <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 533.5 544.3">
    <path fill="#4285F4" d="M533.5 278.4c0-17.7-1.4-35-4-51.7H272v97.9h146.9c-6.4 34.8-25.8 64.3-55 84l89.1 69.4c52-47.9 80.5-118.6 80.5-199.6z"/>
    <path fill="#34A853" d="M272 544.3c72.6 0 133.6-23.9 178.1-64.9l-89.1-69.4c-24.7 16.6-56.3 26.4-89 26.4-68.3 0-126-46-146.7-108.2l-90.8 70c42.7 84.2 130.5 145.1 237.5 145.1z"/>
    <path fill="#FBBC05" d="M125.3 328.2c-10.1-30.2-10.1-62.5 0-92.7l-90.8-70c-39.6 77.8-39.6 168.5 0 246.3l90.8-70z"/>
    <path fill="#EA4335" d="M272 107.7c37.7 0 71.6 13 98.2 34.9l73.5-73.5C405.6 24.8 344.6 0 272 0 165 0 77.2 60.9 34.5 145.1l90.8 70C146 153.7 203.7 107.7 272 107.7z"/>
  </svg>
  Continue with Google
</button>
  
  
  <button class="btn btn-outline">
    <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" alt="Facebook" />
    Continue with Facebook
  </button>

  <div class="footer">
    Already have an account? <a href="email.html">Log in</a>
  </div>

  <!-- Firebase JS -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    function loginWithGoogle() {
      auth.signInWithPopup(provider)
        .then((result) => {
          const user = result.user;
          alert("Welcome " + user.displayName);
          // window.location.href = "home.html";
        })
        .catch((error) => {
          alert("Google login failed: " + error.message);
        });
    }
  </script>
</body>
</html>
