<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmVibe - Log In</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Circular', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .login-container {
      background-color: #000;
      padding: 40px 30px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .logo {
      width: 100px;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 30px;
      font-weight: bold;
      color: #fff;
    }
    .btn {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.3s ease;
    }
    .btn-email {
      background-color: #1DB954;
      color: white;
      border: none;
    }
    .btn-other {
      background-color: #111;
      color: white;
      border: 1px solid #333;
    }
    .btn:hover {
      transform: scale(1.02);
      background-color: #222;
    }
    .icon {
      width: 20px;
      height: 20px;
    }
    .login-link {
      margin-top: 20px;
      font-size: 14px;
      color: #b3b3b3;
    }
    .login-link a {
      color: #1DB954;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="https://raw.githubusercontent.com/amol1436/AmVibe-/refs/heads/main/logo.png" alt="Logo" class="logo" />
    <h1>Sign up to start listening</h1>

    <!-- ✅ Sign Up for Free बटणमधला बदल -->
    <button class="btn btn-email" onclick="window.location.href='signup.html'">
      📧 Sign up for free
    </button>

    <button class="btn btn-other" onclick="window.location.href='phone.html'">
      📱 Continue with phone number
    </button>

    <button class="btn btn-other" onclick="loginWithGoogle()">
      <img src="https://www.google.com/favicon.ico" class="icon" alt="Google" />
      Continue with Google
    </button>

    <button class="btn btn-other" onclick="loginWithFacebook()">
      <img src="https://www.facebook.com/favicon.ico" class="icon" alt="Facebook" />
      Continue with Facebook
    </button>

    <!-- ✅ Login लिंक बदल -->
     
        <div class="signup-link">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>
  

  <!-- Firebase JS SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function loginWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then(result => alert("Welcome, " + result.user.displayName))
        .catch(error => alert("Google Login Error: " + error.message));
    }

    function loginWithFacebook() {
      const provider = new firebase.auth.FacebookAuthProvider();
      auth.signInWithPopup(provider)
        .then(result => alert("Welcome, " + result.user.displayName))
        .catch(error => alert("Facebook Login Error: " + error.message));
    }
  </script>
</body>
</html>
