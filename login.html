<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - AmVibe</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: 'Circular', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-box {
      background-color: #111;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      width: 90%;
      max-width: 400px;
    }
    h2 {
      margin-bottom: 20px;
      color: #1DB954;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #1DB954;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background-color: #1ed760;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login to AmVibe</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="send-button" onclick="sendOTP()">SEND VERIFICATION CODE</button>
  </div>
  <script>
  function sendOTP() {
    // नंतर Firebase कोड टाकू, आत्ता फक्त redirect
    window.location.href = "otp-verify.html";
  }
  </script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2"
    };
    firebase.initializeApp(firebaseConfig);

  function sendOTP() {
    const countryCode = document.getElementById("countryCode").value;
    const phone = document.getElementById("phone").value;
    const fullPhone = countryCode + phone;

    if (!phone) {
      alert("कृपया फोन नंबर टाका");
      return;
    }

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('send-button', {
      size: 'invisible'
    });
    firebase.auth().signInWithPhoneNumber(fullPhone, window.recaptchaVerifier)
      .then(function (confirmationResult) {
        window.confirmationResult = confirmationResult;
        localStorage.setItem("phoneNumber", fullPhone); // पुढे वापरण्यासाठी
        window.location.href = "otp-verify.html";
      })
      .catch(function (error) {
        alert("OTP पाठवण्यात अडचण आली: " + error.message);
      });
  }
</script>
</body>
</html>
