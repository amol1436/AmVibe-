<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AmVibe - Log In</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: 'Circular', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .login-container {
      background-color: #121212;
      padding: 40px;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      width: 120px;
      display: block;
      margin: 0 auto 30px auto;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 25px;
      text-align: center;
    }

    .input-field {
      width: 100%;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 4px;
      border: 1px solid #333;
      background: #2a2a2a;
      color: white;
      font-size: 16px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      border: none;
      color: white;
      background-color: #1DB954;
      margin-top: 10px;
    }

    .signup-link {
      margin-top: 20px;
      text-align: center;
      color: #a7a7a7;
    }

    .signup-link a {
      color: #1DB954;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="https://raw.githubusercontent.com/amol1436/AmVibe-/refs/heads/main/logo.png" alt="AmVibe Logo" class="logo" />
    <h1>Log In to AmVibe</h1>

    <input type="email" id="email" class="input-field" placeholder="Email Address" />
    <input type="password" id="password" class="input-field" placeholder="Password" />

    <button class="btn" onclick="login()">Log In</button>

    <div class="signup-link">
      Don't have an account? <a href="sign.html">Sign Up</a>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2",
      measurementId: "G-WPV8M3E8K2"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (!email || !password) {
        alert("Please enter email and password");
        return;
      }

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          const isFirstTime = localStorage.getItem("firstTimeUser");

          if (isFirstTime === "true") {
            localStorage.removeItem("firstTimeUser");
            window.location.href = "language-preference.html";
          } else {
            window.location.href = "home.html"; // या पेजचा तू उपयोग करतोस का?
          }
        })
        .catch((error) => {
          alert("Login failed: " + error.message);
        });
    }
  </script>
</body>
</html>
