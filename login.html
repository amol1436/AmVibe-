<!DOCTYPE html>

    h1 {

      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      margin-bottom: 30px;
    }
    .btn {
      padding: 12px 25px;
      font-size: 16px;
      background-color: #1DB954;

<body>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {

      projectId: "amvibe-a22db",
