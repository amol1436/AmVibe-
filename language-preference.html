<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Language</title>
  <style>
    body {
      background-color: #000;
      color: white;
      font-family: 'Circular', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 {
      color: #1DB954;
      font-size: 28px;
      margin-bottom: 20px;
    }
    .languages {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }
    .lang-btn {
      background-color: #2a2a2a;
      color: white;
      border: 1px solid #555;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
    }
    .lang-btn.selected {
      background-color: #1DB954;
      color: black;
    }
    .btn {
      background-color: #1DB954;
      border: none;
      color: white;
      padding: 10px 30px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>  <h1>What music do you like?</h1>
  <div class="languages">
    <button class="lang-btn" onclick="toggle(this)">Marathi</button>
    <button class="lang-btn" onclick="toggle(this)">Hindi</button>
    <button class="lang-btn" onclick="toggle(this)">English</button>
    <button class="lang-btn" onclick="toggle(this)">Punjabi</button>
    <button class="lang-btn" onclick="toggle(this)">Tamil</button>
  </div><button class="btn" onclick="submit()">Continue</button>

  <script>
    // Redirect if not first time user
    if (localStorage.getItem("firstTimeUser") !== "true") {
      window.location.href = "login.html";
    }

    function toggle(button) {
      button.classList.toggle('selected');
    }

    function submit() {
      const selected = Array.from(document.querySelectorAll('.lang-btn.selected')).map(btn => btn.innerText);
      if (selected.length === 0) {
        alert("Please select at least one language.");
        return;
      }

      // Store selected languages in localStorage
      localStorage.setItem("preferredLanguages", JSON.stringify(selected));
      // Unset firstTimeUser flag
      localStorage.removeItem("firstTimeUser");
      // Redirect to main home screen
      window.location.href = "login.html";
    }
  </script></body>
</html>
