<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Select Music Preference</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: 'Circular', sans-serif;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 30px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }
    .genre {
      padding: 20px;
      border-radius: 12px;
      color: #fff;
      text-align: center;
      font-weight: bold;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s;
    }
    .genre.selected {
      border: 3px solid #1DB954;
    }
    .next-btn {
      margin-top: 30px;
      display: block;
      width: 100%;
      padding: 15px;
      background-color: #1DB954;
      border: none;
      border-radius: 25px;
      font-size: 18px;
      font-weight: bold;
      color: #000;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>What music do you like?</h1>
  <div class="grid" id="genreGrid">
    <!-- Genre buttons will be generated here -->
  </div>

  <button class="next-btn" onclick="savePreferences()">Next</button>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBara9XDn6DDZeHM8ReakXA3tDzvhSelDY",
      authDomain: "amvibe-a22db.firebaseapp.com",
      projectId: "amvibe-a22db",
      storageBucket: "amvibe-a22db.appspot.com",
      messagingSenderId: "717648312311",
      appId: "1:717648312311:web:c97e204d16e4211b9360f2",
      measurementId: "G-WPV8M3E8K2"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const genres = [
      { name: "Hindi", color: "#e74c3c" },
      { name: "International", color: "#d35400" },
      { name: "Punjabi", color: "#8e44ad" },
      { name: "Tamil", color: "#f39c12" },
      { name: "Telugu", color: "#27ae60" },
      { name: "Malayalam", color: "#16a085" },
      { name: "Marathi", color: "#d35400" },
      { name: "Gujarati", color: "#e84393" },
      { name: "Bengali", color: "#3498db" },
      { name: "Kannada", color: "#c0392b" },
    ];

    const selectedGenres = [];

    const grid = document.getElementById("genreGrid");

    genres.forEach((genre) => {
      const div = document.createElement("div");
      div.className = "genre";
      div.innerText = genre.name;
      div.style.backgroundColor = genre.color;
      div.onclick = () => toggleGenre(div, genre.name);
      grid.appendChild(div);
    });

    function toggleGenre(el, name) {
      const index = selectedGenres.indexOf(name);
      if (index >= 0) {
        selectedGenres.splice(index, 1);
        el.classList.remove("selected");
      } else {
        selectedGenres.push(name);
        el.classList.add("selected");
      }
    }

    function savePreferences() {
      const user = auth.currentUser;
      if (!user) {
        alert("User not logged in");
        return;
      }

      db.collection("users").doc(user.uid).set({
        musicPreferences: selectedGenres
      }, { merge: true }).then(() => {
        alert("Preferences saved!");
        window.location.href = "home.html"; // पुढच्या स्क्रीनकडे redirect
      }).catch((error) => {
        alert("Error saving preferences: " + error.message);
      });
    }
  </script>
</body>
</html>
