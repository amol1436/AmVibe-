<!DOCTYPE html>
<html>
<head>
  <title>Music Preferences</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .genre-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .genre {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      padding: 20px;
      font-size: 20px;
      font-weight: bold;
      color: white;
    }

    .genre input {
      position: absolute;
      top: 10px;
      right: 10px;
      transform: scale(1.5);
    }

    button {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: bold;
      background-color: white;
      color: black;
      border: none;
      border-radius: 20px;
    }
  </style>
</head>
<body>

  <h2>What music do you like?</h2>

  <div class="genre-grid">
    <label class="genre" style="background: #e53935;">
      Hindi
      <input type="checkbox" value="Hindi" name="genre" />
    </label>
    <label class="genre" style="background: #ff9800;">
      International
      <input type="checkbox" value="International" name="genre" />
    </label>
    <label class="genre" style="background: #9c27b0;">
      Punjabi
      <input type="checkbox" value="Punjabi" name="genre" />
    </label>
    <label class="genre" style="background: #ffb74d;">
      Tamil
      <input type="checkbox" value="Tamil" name="genre" />
    </label>
    <label class="genre" style="background: #4caf50;">
      Telugu
      <input type="checkbox" value="Telugu" name="genre" />
    </label>
    <label class="genre" style="background: #81c784;">
      Malayalam
      <input type="checkbox" value="Malayalam" name="genre" />
    </label>
    <label class="genre" style="background: #a1887f;">
      Marathi
      <input type="checkbox" value="Marathi" name="genre" />
    </label>
    <label class="genre" style="background: #ec407a;">
      Gujarati
      <input type="checkbox" value="Gujarati" name="genre" />
    </label>
    <label class="genre" style="background: #42a5f5;">
      Bengali
      <input type="checkbox" value="Bengali" name="genre" />
    </label>
    <label class="genre" style="background: #d32f2f;">
      Kannada
      <input type="checkbox" value="Kannada" name="genre" />
    </label>
  </div>

  <button id="savePreferencesBtn">Next</button>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script>
    // Firebase config (already setup in your project)
    var firebaseConfig = {
      apiKey: "तुझं-apiKey",
      authDomain: "तुझं-authDomain",
      projectId: "तुझं-projectId",
      storageBucket: "तुझं-storageBucket",
      messagingSenderId: "तुझं-msgID",
      appId: "तुझं-appID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    firebase.auth().onAuthStateChanged(function(user) {
      if (user) {
        document.getElementById("savePreferencesBtn").addEventListener("click", function () {
          const selected = [];
          document.querySelectorAll('input[name="genre"]:checked').forEach((cb) => {
            selected.push(cb.value);
          });

          db.collection("users").doc(user.uid).set({
            preferences: selected
          }, { merge: true }).then(() => {
            window.location.href = "home.html";
          });
        });
      } else {
        window.location.href = "Email.html";
      }
    });
  </script>

</body>
</html>
